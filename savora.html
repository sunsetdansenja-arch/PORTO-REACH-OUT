<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Savora Artisan | High-Conversion v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        maroon: '#800020',
                        cream: '#F8F5F1',
                        charcoal: '#1F1F1F',
                        gold: '#C9A66B',
                        'apple-gray': '#F5F5F7'
                    },
                    animation: {
                        'bounce-subtle': 'bounce-subtle 0.5s ease-in-out',
                    },
                    keyframes: {
                        'bounce-subtle': {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.05)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-nav { background: rgba(248, 245, 241, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:active { transform: scale(0.98); }
        .btn-spring { transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-spring:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex justify-center min-h-screen bg-[#E5E5E5] font-sans text-charcoal selection:bg-maroon/10">

    <div class="w-full max-w-[480px] bg-cream relative min-h-screen shadow-2xl overflow-x-hidden pb-32">
        
        <header class="relative h-[85vh] w-full overflow-hidden">
            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=600&auto=format&fit=crop" 
                 alt="Artisan Pastry" class="w-full h-full object-cover scale-105 transform">
            <div class="absolute inset-0 bg-gradient-to-t from-charcoal via-charcoal/20 to-transparent"></div>
            
            <div class="absolute bottom-0 left-0 w-full p-8" data-aos="fade-up">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-maroon text-white text-[10px] font-bold px-2 py-1 rounded uppercase tracking-widest animate-pulse">Limited Daily Stock</span>
                    <span class="text-xs text-white/90">⭐ 4.98 (312+ Orders Today)</span>
                </div>
                <h1 class="text-5xl font-bold text-white mb-3 tracking-tighter leading-[0.9]">Savora Artisan.</h1>
                <p class="text-white/70 font-medium mb-8 text-base">Handcrafted daily. Delivered fresh within 60 mins.</p>
                
                <div class="flex flex-col gap-3">
                    <button onclick="checkoutWA()" class="bg-maroon text-white font-bold py-4 px-6 rounded-2xl w-full btn-spring shadow-lg flex justify-center items-center gap-2">
                        Pesan Sekarang (WhatsApp)
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.67-1.611-.918-2.213-.242-.588-.487-.51-.67-.52-.172-.01-.37-.012-.568-.012-.199 0-.523.074-.797.372-.273.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-4.821 7.454c-1.679 0-3.325-.449-4.753-1.299l-.341-.203-3.534.926.943-3.441-.222-.353c-.933-1.485-1.425-3.195-1.425-4.947 0-5.184 4.216-9.4 9.404-9.4 2.512 0 4.873.978 6.647 2.754 1.774 1.776 2.752 4.137 2.752 6.65 0 5.185-4.218 9.401-9.405 9.401m11.168-15.011C21.616 4.606 18.91 2.96 16.002 2.96 10.375 2.96 5.803 7.532 5.803 13.158c0 1.798.469 3.555 1.357 5.115l-1.44 5.259 5.381-1.411c1.512.823 3.212 1.258 4.937 1.259h.004c5.626 0 10.201-4.571 10.201-10.197 0-2.726-1.062-5.289-2.991-7.217z"/></svg>
                    </button>
                    <button onclick="scrollToMenu()" class="bg-white/10 backdrop-blur-md text-white font-semibold py-4 px-6 rounded-2xl w-full border border-white/20">
                        Lihat Menu Lengkap
                    </button>
                </div>
            </div>
        </header>

        <section class="p-6 grid grid-cols-3 gap-4 border-b border-black/5" data-aos="fade-up">
            <div class="text-center">
                <div class="bg-maroon/5 w-10 h-10 rounded-full flex items-center justify-center mx-auto mb-2 text-maroon">🥖</div>
                <p class="text-[10px] font-bold uppercase tracking-tighter">Artisan Made</p>
            </div>
            <div class="text-center">
                <div class="bg-maroon/5 w-10 h-10 rounded-full flex items-center justify-center mx-auto mb-2 text-maroon">🔥</div>
                <p class="text-[10px] font-bold uppercase tracking-tighter">Freshly Baked</p>
            </div>
            <div class="text-center">
                <div class="bg-maroon/5 w-10 h-10 rounded-full flex items-center justify-center mx-auto mb-2 text-maroon">🚀</div>
                <p class="text-[10px] font-bold uppercase tracking-tighter">Fast Delivery</p>
            </div>
        </section>

        <nav id="menu-section" class="sticky top-0 z-30 glass-nav py-4 px-6 border-b border-black/5 overflow-x-auto no-scrollbar flex gap-3">
            <button onclick="filterCategory('all', this)" class="category-btn active px-5 py-2 rounded-xl bg-maroon text-white font-semibold text-xs whitespace-nowrap shadow-sm">All</button>
            <button onclick="filterCategory('coffee', this)" class="category-btn px-5 py-2 rounded-xl bg-white text-charcoal/50 font-semibold text-xs whitespace-nowrap shadow-sm border border-black/5">Coffee</button>
            <button onclick="filterCategory('pastry', this)" class="category-btn px-5 py-2 rounded-xl bg-white text-charcoal/50 font-semibold text-xs whitespace-nowrap shadow-sm border border-black/5">Pastry</button>
            <button onclick="filterCategory('cakes', this)" class="category-btn px-5 py-2 rounded-xl bg-white text-charcoal/50 font-semibold text-xs whitespace-nowrap shadow-sm border border-black/5">Cakes</button>
        </nav>

        <main id="product-container" class="p-6 space-y-6">
            </main>

        <section class="px-6 py-10 bg-maroon text-white/90">
            <p class="italic font-medium text-lg mb-4">"The best croissant I've ever had in Jakarta. Period."</p>
            <p class="text-xs font-bold uppercase tracking-widest text-gold">— Sarah J., Food Enthusiast</p>
        </section>

        <div id="sticky-cart" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[440px] z-50 transform translate-y-40 transition-all duration-500 cubic-bezier(0.175, 0.885, 0.32, 1.275)">
            <div class="bg-charcoal text-white rounded-3xl p-4 shadow-2xl flex justify-between items-center border border-white/10">
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <span class="text-2xl">🛍️</span>
                        <span id="cart-badge" class="absolute -top-2 -right-2 bg-maroon text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase font-bold text-white/50">Estimasi Total</p>
                        <p id="cart-total" class="font-bold text-lg">Rp 0</p>
                    </div>
                </div>
                <button onclick="checkoutWA()" class="bg-maroon hover:bg-maroon/90 text-white font-bold py-3 px-6 rounded-2xl transition-all active:scale-95">
                    Order Now
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        const products = [
            { id: 1, category: 'pastry', name: 'Butter Croissant', desc: 'Handcrafted with AOP French Butter.', price: 35000, img: 'https://images.unsplash.com/photo-1555507036-ab1f4038808a?q=80&w=400&auto=format&fit=crop', badge: 'Best Seller' },
            { id: 2, category: 'coffee', name: 'Signature Latte', desc: 'Reserve espresso & creamy oat milk.', price: 48000, img: 'https://images.unsplash.com/photo-1589396575653-c09c794ff6a6?q=80&w=400&auto=format&fit=crop', badge: '' },
            { id: 3, category: 'cakes', name: 'Tiramisu Cake', desc: 'Espresso-soaked layers with mascarpone.', price: 65000, img: 'https://images.unsplash.com/photo-1571115177098-24ec42ed204d?q=80&w=400&auto=format&fit=crop', badge: 'New' },
            { id: 4, category: 'pastry', name: 'Pain au Chocolat', desc: 'Dark chocolate wrapped in buttery layers.', price: 42000, img: 'https://images.unsplash.com/photo-1530610476181-d83430b64dcd?q=80&w=400&auto=format&fit=crop', badge: '' }
        ];

        let cart = {};

        function renderProducts(filter = 'all') {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            
            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
            
            filtered.forEach(p => {
                const qty = cart[p.name]?.qty || 0;
                const card = `
                    <div class="product-card bg-white rounded-[32px] p-5 shadow-sm border border-black/5" data-aos="fade-up">
                        <div class="relative rounded-2xl overflow-hidden aspect-square mb-5">
                            <img src="${p.img}" loading="lazy" alt="${p.name}" class="w-full h-full object-cover">
                            ${p.badge ? `<div class="absolute top-3 left-3 bg-white/95 backdrop-blur-sm text-maroon text-[10px] font-black px-2 py-1 rounded shadow-sm">${p.badge}</div>` : ''}
                        </div>
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-xl tracking-tight">${p.name}</h3>
                            <span class="font-black text-lg text-maroon">${(p.price/1000)}k</span>
                        </div>
                        <p class="text-charcoal/50 text-sm mb-6 leading-relaxed">${p.desc}</p>
                        
                        <div id="btn-container-${p.id}">
                            ${qty > 0 ? `
                                <div class="flex items-center justify-between bg-apple-gray rounded-2xl p-1">
                                    <button onclick="updateQty('${p.name}', -1)" class="w-12 h-12 flex items-center justify-center font-bold text-xl text-maroon">-</button>
                                    <span class="font-bold">${qty}</span>
                                    <button onclick="updateQty('${p.name}', 1)" class="w-12 h-12 flex items-center justify-center font-bold text-xl text-maroon">+</button>
                                </div>
                            ` : `
                                <button onclick="updateQty('${p.name}', 1)" class="w-full bg-charcoal text-white font-bold py-4 rounded-2xl btn-spring">
                                    + Add to Cart
                                </button>
                            `}
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function filterCategory(cat, el) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('bg-maroon', 'text-white');
                btn.classList.add('bg-white', 'text-charcoal/50');
            });
            el.classList.add('bg-maroon', 'text-white');
            el.classList.remove('text-charcoal/50');
            renderProducts(cat);
        }

        function updateQty(name, change) {
            const product = products.find(p => p.name === name);
            if (!cart[name]) cart[name] = { price: product.price, qty: 0 };
            
            cart[name].qty += change;
            if (cart[name].qty <= 0) delete cart[name];
            
            updateCartUI();
            renderProducts(document.querySelector('.category-btn.active')?.innerText.toLowerCase() || 'all');
        }

        function updateCartUI() {
            let total = 0, count = 0;
            for (let id in cart) {
                total += cart[id].price * cart[id].qty;
                count += cart[id].qty;
            }

            document.getElementById('cart-total').innerText = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(total);
            document.getElementById('cart-badge').innerText = count;

            const bar = document.getElementById('sticky-cart');
            if (count > 0) {
                bar.classList.remove('translate-y-40');
                bar.classList.add('animate-bounce-subtle');
                setTimeout(() => bar.classList.remove('animate-bounce-subtle'), 500);
            } else {
                bar.classList.add('translate-y-40');
            }
        }

        function checkoutWA() {
            let msg = "Halo Savora Artisan, saya mau pesan:\n\n";
            let total = 0;
            for (let name in cart) {
                msg += `• ${name} (${cart[name].qty}x)\n`;
                total += cart[name].price * cart[name].qty;
            }
            if (total === 0) return alert("Pilih menu dulu bro!");
            msg += `\nTotal: Rp ${total.toLocaleString('id-ID')}\n\nKirim ke alamat saya ya.`;
            window.open(`https://wa.me/6281234567890?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function scrollToMenu() { document.getElementById('menu-section').scrollIntoView({ behavior: 'smooth' }); }

        // Initial Load
        renderProducts();
    </script>
</body>
</html>
