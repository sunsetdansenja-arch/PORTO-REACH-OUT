<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Kopi Klasik | Klasik Utopia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            /* Menambahkan tekstur noise untuk kesan unfinished/raw */
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png"); 
        }
        
        .glass-card { 
            background: rgba(20, 20, 20, 0.7); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .btn-sky-blue { 
            background-color: #00BFFF; 
            color: #000; 
            box-shadow: 0 0 25px rgba(0, 191, 255, 0.3);
            font-weight: 800;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Tipografi Brutalist: Tight tracking & Italic headings */
        .brutalist-title {
            letter-spacing: -0.05em;
            font-style: italic;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="text-zinc-100 min-h-screen flex justify-center p-5 pb-12">
    <div class="w-full max-w-md flex flex-col">
        
        <header class="text-center mt-8 mb-8">
            <h1 class="text-4xl font-extrabold brutalist-title leading-none mb-2">KLASIK UTOPIA.</h1>
            <p class="text-zinc-500 text-[11px] uppercase tracking-[0.2em] font-light">Cultural space for the culture and the people</p>
        </header>

        <div class="w-full mb-10">
            <div class="flex overflow-x-auto snap-x snap-mandatory gap-4 hide-scrollbar">
                <div class="snap-center shrink-0 w-[90%] aspect-[4/3] rounded-[2rem] overflow-hidden border border-white/10">
                    <img src="download.jpg" class="w-full h-full object-cover grayscale-[0.3] hover:grayscale-0 transition-all duration-500">
                </div>
                <div class="snap-center shrink-0 w-[90%] aspect-[4/3] rounded-[2rem] overflow-hidden border border-white/10">
                    <img src="MENU KLASIK KARAWACI.jpg" class="w-full h-full object-cover grayscale-[0.3]">
                </div>
                <div class="snap-center shrink-0 w-[90%] aspect-[4/3] rounded-[2rem] overflow-hidden border border-white/10">
                    <img src="edited-image.png" class="w-full h-full object-cover grayscale-[0.3]">
                </div>
            </div>
            <div class="flex justify-center gap-1.5 mt-4">
                <div class="w-1.5 h-1.5 rounded-full bg-[#00BFFF]"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-zinc-800"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-zinc-800"></div>
            </div>
        </div>

        <div class="space-y-4 mb-10">
            <a href="menu.html" class="btn-sky-blue w-full p-5 rounded-2xl flex items-center justify-center gap-3 text-sm tracking-widest uppercase active:scale-[0.97] transition-transform">
                <span>View Digital Menu</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </a>
            
            <a href="https://www.tiktok.com/@belakanglayarklasik" target="_blank" class="glass-card w-full p-5 rounded-2xl flex items-center justify-between group">
                <span class="text-xs font-bold tracking-widest uppercase italic">The Behind The Scenes</span>
                <span class="text-[#00BFFF] group-hover:translate-x-1 transition-transform">TIKTOK</span>
            </a>
        </div>

        <div class="space-y-8">
            <section>
                <h2 class="text-[10px] font-black tracking-[0.3em] text-zinc-600 uppercase mb-4 ml-1 italic">The Locations</h2>
                <div class="grid grid-cols-2 gap-3">
                    <a href="#" class="glass-card p-4 rounded-xl text-center border-white/5 active:bg-white/5">
                        <span class="text-[11px] font-bold tracking-tighter">KARAWACI</span>
                    </a>
                    <a href="#" class="glass-card p-4 rounded-xl text-center border-white/5 active:bg-white/5">
                        <span class="text-[11px] font-bold tracking-tighter">TEBET</span>
                    </a>
                </div>
            </section>

            <section>
                <h2 class="text-[10px] font-black tracking-[0.3em] text-zinc-600 uppercase mb-4 ml-1 italic">Doorstep Delivery</h2>
                <div class="grid grid-cols-2 gap-3">
                    <a href="https://gofood.co.id/jakarta/restaurant/toko-kopi-klasik-karawaci-d3741102-7267-4899-b8df-925f6bab5985" class="glass-card p-4 rounded-xl flex items-center justify-center gap-2 border-white/5">
                        <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                        <span class="text-[11px] font-bold">GOFOOD KWN</span>
                    </a>
                    <a href="https://gofood.co.id/jakarta/restaurant/toko-kopi-klasik-tebet-bb300662-4ab4-4134-9424-b5f0d1ad2ce2" class="glass-card p-4 rounded-xl flex items-center justify-center gap-2 border-white/5">
                        <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                        <span class="text-[11px] font-bold">GOFOOD TBT</span>
                    </a>
                </div>
            </section>
        </div>

        <footer class="mt-20 mb-8 text-center">
            <p class="text-[9px] text-zinc-700 tracking-[0.4em] uppercase">No Gimmicks. Just Utopia.</p>
        </footer>
    </div>
</body>
</html>
