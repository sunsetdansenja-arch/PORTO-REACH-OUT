<!DOCTYPE html>
<html lang="id">
<head>

    <title>Toko Kopi Klasik | Klasik Utopia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; /* Hitam pekat/Brutalist */
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png"); 
        }
        
        /* Dark Glassmorphism */
        .glass-card { 
            background: rgba(20, 20, 20, 0.6); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: all 0.3s ease; 
        }
        
        /* Tombol Utama - Deep Sky Blue */
        .btn-primary { 
            background-color: #00BFFF; 
            color: #000; 
            font-weight: 800; 
            transition: transform 0.2s; 
            box-shadow: 0 4px 20px rgba(0, 191, 255, 0.25);
        }
        .btn-primary:active { transform: scale(0.96); }

        /* Menyembunyikan Scrollbar untuk Carousel tapi tetap bisa di-scroll */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
